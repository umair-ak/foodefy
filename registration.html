<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration</title>
    <link rel="stylesheet" href="css/regstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <h1 class = "display-6">register/sign-up</h1>
    <div class="everything">

        <form action="">
            <div class="row middle">
                <div class="col">
                    <input type="text" class="form-control" placeholder="First name" aria-label="First name">
                </div>
                <div class="col">
                    <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
                </div>
            </div>

            <form class="row g-3">
                <div class="col-12">
                  <!-- <label for="inputEmail4" class="form-label">Email</label> -->
                  <input type="email" class="form-control" id="inputEmail4" placeholder="email">
                </div>
                <div class="col-12">
                  <!-- <label for="inputPassword4" class="form-label">Password</label> -->
                  <input type="password" class="form-control" id="inputPassword4" placeholder="password">
                </div>
                <div class="col-12">
                  <!-- <label for="inputPassword4" class="form-label">Password</label> -->
                  <input type="password" class="form-control" id="inputPassword4" placeholder="confirm password">
                </div>
                <div class="col-12">
                  <!-- <label for="inputAddress" class="form-label">Address</label> -->
                  <input type="text" class="form-control" id="inputAddress" placeholder="Address">
                </div>
                <div class="row">

                    <div class="col-md-4">
                        <!-- <label for="inputCity" class="form-label">City</label> -->
                        <input type="text" class="form-control" id="inputCity" placeholder="city">
                    </div>
                    <div class="col-md-4">
                        <!-- <label for="inputState" class="form-label">State</label> -->
                  <select id="inputState" class="form-select">
                    <option selected>choose state</option>
                    <option>Telengana</option>
                    <option>Maharastra</option>
                    <!-- <option>Kerela</option> -->
                    <option>Tamil Nadu</option>
                    <option>Andra</option>
                    <option>Rajasthan</option>
                    <option>Karnataka</option>
                    
                </select>
            </div>
            <div class="col-md-4">
                <!-- <label for="inputZip" class="form-label">Zip</label> -->
                <input type="number" class="form-control" id="inputZip" placeholder="zip-code">
            </div>
        </div>
                <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="gridCheck">
                    <label class="form-check-label" for="gridCheck">
                      agree to all the terms and conditions...
                    </label>
                  </div>
                </div>
                <div>
                  <button type="submit" class="btn btn-success">Sign in</button>
                </div>
            </form>
        </form>
        
        
    </div>
</body>
</html>
